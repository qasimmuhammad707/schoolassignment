<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Management System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 50px; background: #f0f2f5; }
        .box { background: white; padding: 30px; max-width: 450px; margin: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; box-sizing: border-box; }
        input { border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #0056b3; }
        ul { padding: 0; }
        li { background: #f8f9fa; margin: 8px 0; padding: 12px; border-left: 5px solid #007bff; list-style: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="box">
    <h2>School Management</h2>
    <input type="text" id="name" placeholder="Enter Student Name">
    <input type="text" id="grade" placeholder="Enter Grade / Class">
    <button onclick="addStudent()">Add Student</button>

    <h3>Registered Students</h3>
    <ul id="list"></ul>
</div>

<script>
    // window.location.hostname se automatic local ya EC2 ka IP select ho jata hai
    const API = `http://${window.location.hostname}:5000/api/students`;

    // Database se data la kar screen par dikhane ka function
    async function loadStudents() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(s => {
                list.innerHTML += `<li><strong>${s.name}</strong> - Class: ${s.grade}</li>`;
            });
        } catch (err) { console.error("Fetch error:", err); }
    }

    // Form se data utha kar backend API ko bhejne ka function
    async function addStudent() {
        const name = document.getElementById('name').value;
        const grade = document.getElementById('grade').value;
        if(!name || !grade) return alert("Please fill both fields!");

        try {
            await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, grade })
            });
            document.getElementById('name').value = '';
            document.getElementById('grade').value = '';
            loadStudents(); // Data add hone ke baad list ko refresh karein
        } catch (err) { console.error("Post error:", err); }
    }

    // Page khulye hi puraani list load ho jaye
    loadStudents();
</script>
</body>
</html>
